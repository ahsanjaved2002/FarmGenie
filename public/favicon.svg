<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <clipPath id="circle">
      <circle cx="50" cy="50" r="48"/>
    </clipPath>
  </defs>
  
  <!-- Circular background -->
  <circle cx="50" cy="50" r="48" fill="#10b981" stroke="#059669" stroke-width="2"/>
  
  <!-- FarmGenie text in circle -->
  <text x="50" y="35" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">
    Farm
  </text>
  <text x="50" y="50" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">
    Genie
  </text>
  
  <!-- Simple sprout icon -->
  <path d="M50 55 Q45 60 50 70 Q55 60 50 55" fill="#86efac" stroke="white" stroke-width="1"/>
  <line x1="50" y1="70" x2="50" y2="75" stroke="white" stroke-width="2"/>
  
  <!-- Outer ring for emphasis -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#059669" stroke-width="2"/>
</svg>
